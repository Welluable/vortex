        - version
        - as_of
        - pack_type
        - manifest_json
        - export_path
        - created_at
      properties:
        id:
          type: string
          format: uuid
        space_id:
          type: string
          format: uuid
        version:
          type: integer
        as_of:
          type: integer
          description: Unix ms truth snapshot time
        label:
          type: string
          nullable: true
        pack_type:
          $ref: "#/components/schemas/ContextPackType"
        manifest_json:
          type: object
          additionalProperties: true
        export_path:
          type: string
        created_at:
          type: integer

    ContextPackListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ContextPack"
