      type: object
      required: [context_pack, conflicts_open]
      properties:
        context_pack:
          $ref: "#/components/schemas/ContextPack"
        conflicts_open:
          type: integer
        warning:
          type: string
          nullable: true
          description: Present when conflicts_open > 0

    ContextPackDocument:
      type: object
      description: On-disk pack.json schema (TECHNICAL.md §8.3)
      required:
        - vortex_context_pack
        - pack_type
        - space_id
        - version
        - as_of
        - conflicts_open
        - entities
        - true_facts
        - active_decisions
        - source_index
      properties:
        vortex_context_pack:
          type: string
          enum: ["1.0"]
        pack_type:
          $ref: "#/components/schemas/ContextPackType"
        space_id:
          type: string
          format: uuid
        version:
          type: integer
        as_of:
          type: string
          format: date-time
        conflicts_open:
          type: integer
        entities:
          type: array
          items:
            type: object
            required: [id, canonical_name, entity_type]
            properties:
              id:
                type: string
                format: uuid
              canonical_name:
                type: string
              entity_type:
                type: string
        true_facts:
          type: array
          items:
            type: object
            required: [id, entity_id, fact_key, display_text, provenance]
            properties:
              id:
                type: string
                format: uuid
              entity_id:
                type: string
                format: uuid
              fact_key:
                type: string
              display_text:
                type: string
              provenance:
                type: array
                items:
                  type: object
                  properties:
                    chunk_id:
                      type: string
                      format: uuid
                    source_id:
                      type: string
                      format: uuid
        active_decisions:
          type: array
          items:
            type: object
            required: [id, title, body, applies_to, provenance]
            properties:
              id:
                type: string
                format: uuid
              title:
                type: string
              body:
                type: string
              applies_to:
                type: array
                items:
                  type: string
                  format: uuid
              provenance:
                type: array
                items:
                  type: object
                  properties:
                    chunk_id:
                      type: string
                      format: uuid
                    source_id:
                      type: string
                      format: uuid
        source_index:
          type: array
          items:
            type: object
            required: [source_id, original_filename, sha256]
            properties:
              source_id:
                type: string
                format: uuid
              original_filename:
                type: string
              sha256:
                type: string
        proposed_appendix:
          type: object
          description: Full pack type only
          properties:
            proposed_facts:
              type: array
              items:
                type: object
                required: [id, entity_id, display_text, trust, provenance]
                properties:
                  id:
                    type: string
                    format: uuid
                  entity_id:
                    type: string
                    format: uuid
                  display_text:
                    type: string
                  trust:
                    type: string
                    enum: [unverified]
                  provenance:
                    type: array
                    items:
                      type: object
                      properties:
                        chunk_id:
                          type: string
                          format: uuid
            pending_decisions:
              type: array
              items:
                type: object
                required: [review_item_id, title, body, trust]
                properties:
                  review_item_id:
                    type: string
                    format: uuid
                  title:
                    type: string
                  body:
                    type: string
                  trust:
                    type: string
                    enum: [unverified]
                  chunk_id:
                    type: string
                    format: uuid
